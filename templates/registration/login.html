{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-140px)] bg-gray-50">
  <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 max-w-sm w-full mx-4">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6 font-display">Welcome Back</h2>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% if form.errors %}
        <p class="text-sm text-red-600 bg-red-50 p-3 rounded-md font-medium">Invalid username or password.</p>
      {% endif %}
      
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
      </div>
      {% endfor %}
      
      <button type="submit" class="w-full mt-6 bg-blue-600 text-white font-semibold py-2.5 rounded-lg shadow-sm hover:bg-blue-700 active:scale-[0.98] transition-all">Log In</button>
      
      <div class="text-center mt-6">
        <p class="text-sm text-gray-600">Don't have an account? <a href="{% url 'signup' %}" class="text-blue-600 font-medium hover:underline">Sign up securely.</a></p>
      </div>
    </form>
  </div>
</div>
<style>
    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 0.625rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        outline: none;
        transition: border-color 0.15s ease-in-out;
    }
    input[type="text"]:focus, input[type="password"]:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
    }
</style>
{% endblock %}
