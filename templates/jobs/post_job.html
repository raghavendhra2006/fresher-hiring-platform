{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Step 1: Construct Job Blueprint</h1>
    <p class="text-gray-500 mb-8 border-b pb-6 text-sm">Define your base hiring variables and explicitly attach the technical constraints natively.</p>
    
    <form method="post" action="{% url 'hr_post_job' %}" class="space-y-6 bg-white p-8 border border-gray-200 rounded-3xl shadow-sm">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Job Designation / Title</label>
            <input type="text" name="title" required class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none shadow-sm transition" placeholder="e.g. Lead Django Engineer">
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Detailed Role Requirements</label>
            <textarea name="description" required rows="5" class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none shadow-sm transition" placeholder="Detail the core constraints..."></textarea>
        </div>
        <div class="pt-2">
            <label class="block text-sm font-bold text-gray-700 mb-3">Target Technical Skill Matrix</label>
            <p class="text-xs text-gray-400 mb-3">Hold Control (CTRL) or Command to select multiple explicit framework mappings.</p>
            <select multiple name="skills" class="w-full text-sm border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm min-h-[160px]">
                {% for skill in skills %}
                <option value="{{ skill.id }}" class="py-1.5 px-2 hover:bg-indigo-50 hover:text-indigo-700 font-medium tracking-wide">{{ skill.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="pt-6 border-t mt-4">
            <button type="submit" class="w-full bg-gray-900 border-none text-white font-black tracking-wide py-3.5 text-sm rounded-xl shadow-lg hover:bg-indigo-600 transition active:scale-[0.98]">Proceed to Algorithm Scripting &rarr; </button>
        </div>
    </form>
</div>
{% endblock %}
