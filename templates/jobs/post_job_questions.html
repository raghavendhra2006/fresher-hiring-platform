{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Step 2: Initialize Algorithm Matrix</h1>
    <p class="text-gray-500 mb-8 border-b pb-6 text-sm">Assign Yes/No conditional questions strictly mapped against: <strong class="text-indigo-600">{{ job.title }}</strong></p>
    
    <form method="post" action="{% url 'hr_add_questions' job.id %}" class="space-y-6 bg-white p-8 border border-gray-200 rounded-3xl shadow-sm">
        {% csrf_token %}
        <div class="space-y-8">
            <fieldset class="bg-indigo-50/40 p-5 rounded-2xl border border-indigo-100 shadow-sm relative pt-6">
                <span class="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded shadow-sm">Query Block 01</span>
                <input type="text" name="q1_text" class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm mb-4" placeholder="e.g. Do you have 3+ years experience? Optional.">
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Algorithmic Resolution Requirement</label>
                <select name="q1_yesno" class="w-full text-sm border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer font-bold text-gray-700">
                    <option value="yes">Requires applicant to select 'YES'</option>
                    <option value="no">Requires applicant to select 'NO'</option>
                </select>
            </fieldset>
            
            <fieldset class="bg-indigo-50/40 p-5 rounded-2xl border border-indigo-100 shadow-sm relative pt-6">
                <span class="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded shadow-sm">Query Block 02</span>
                <input type="text" name="q2_text" class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm mb-4" placeholder="Add further logic constraints if necessary. Optional.">
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Algorithmic Resolution Requirement</label>
                <select name="q2_yesno" class="w-full text-sm border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer font-bold text-gray-700">
                    <option value="yes">Requires applicant to select 'YES'</option>
                    <option value="no">Requires applicant to select 'NO'</option>
                </select>
            </fieldset>
            
            <fieldset class="bg-indigo-50/40 p-5 rounded-2xl border border-indigo-100 shadow-sm relative pt-6">
                <span class="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded shadow-sm">Query Block 03</span>
                <input type="text" name="q3_text" class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm mb-4" placeholder="Any final verification logic? Optional.">
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Algorithmic Resolution Requirement</label>
                <select name="q3_yesno" class="w-full text-sm border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer font-bold text-gray-700">
                    <option value="yes">Requires applicant to select 'YES'</option>
                    <option value="no">Requires applicant to select 'NO'</option>
                </select>
            </fieldset>
            
            <fieldset class="bg-indigo-50/40 p-5 rounded-2xl border border-indigo-100 shadow-sm relative pt-6">
                <span class="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded shadow-sm">Query Block 04</span>
                <input type="text" name="q4_text" class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm mb-4" placeholder="Additional logic? Optional.">
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Algorithmic Resolution Requirement</label>
                <select name="q4_yesno" class="w-full text-sm border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer font-bold text-gray-700">
                    <option value="yes">Requires applicant to select 'YES'</option>
                    <option value="no">Requires applicant to select 'NO'</option>
                </select>
            </fieldset>
            
            <fieldset class="bg-indigo-50/40 p-5 rounded-2xl border border-indigo-100 shadow-sm relative pt-6">
                <span class="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded shadow-sm">Query Block 05</span>
                <input type="text" name="q5_text" class="w-full text-sm px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm mb-4" placeholder="Final verification logic? Optional.">
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Algorithmic Resolution Requirement</label>
                <select name="q5_yesno" class="w-full text-sm border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer font-bold text-gray-700">
                    <option value="yes">Requires applicant to select 'YES'</option>
                    <option value="no">Requires applicant to select 'NO'</option>
                </select>
            </fieldset>
        </div>
        <div class="pt-6 border-t mt-8">
            <button type="submit" class="w-full bg-green-600 border-none text-white font-black tracking-wide py-4 text-sm rounded-xl shadow-lg hover:bg-green-700 transition active:scale-[0.98]">Launch Active Job Form &rarr; </button>
        </div>
    </form>
</div>
{% endblock %}
